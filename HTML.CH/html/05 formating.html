<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport"
        content="width=device-width,initial-scale=1.0">
        <title> formating</title>
    
    </head>
    <body style="background-color: rgb(218, 13, 13);">
    <!-- ini tulisan bentuk tebal -->
    <p> nama saya <strong>Cepi</strong></p>

    <!-- ini tulisan bentuk emphasized -->
    <p> teman saya agak <i>cabul</i></p>

    <!-- ini tulisan bentuk bold -->
    <p>teman saya agak <b>stress</b></p>

    <!-- ini tulisan bentuk lebih kecil -->
    <p><em>teman saya yang berinisial R rada pedo</em></p>

    <!-- ini tulisan yang di tandai -->
    <p>pemerintah konoha selalu<mark>jujur</mark></p>

    <!-- ini teks yang lebih kecil -->
    <p>aku suka<small>duit</small></p>

    <!-- ini teks yang di hapus -->
    <p>rada <del>gila</del> cuy</p>

    <!-- ini teks inserted -->
    <p>hidup <ins>jokowi</ins></p>

    <!-- ini subcript teks -->
    <p>au ah <sub>malas</sub></p>

    <!-- ini teks superscript -->
    <p>yang penting <sup>nulis</sup></p>


    </body>
</html>
