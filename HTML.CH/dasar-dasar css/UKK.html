<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKK</title>
    <link rel="stylesheet" href="../css/UKK.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body> 
<header>
    <nav class="navbar">
        <ul class="navmenu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Portofolio</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="search-bar">
            <input type="text" placeholder="Search...">
        </div>
    </nav>
</header>

<div class="container">
    <h1>Login</h1>
    <form>
        <label>Email</label>
        <input type="text" name="Email">
        <label>Password</label>
        <input type="password" name="password">
        <div class="remember-forgot">
            <div class="remember-box">
                <input type="checkbox" id="Remember">
                <label for="Remember">Remember Username</label>
            </div>
            <a href="#" class="forgot">Forgot Password?</a>
        </div>
        <button type="submit">Login</button>
        <p>No Account? <a href="#">Sign Up</a></p>
    </form>
</div>

<div class="name-box">
    <h1 class="blink-text">Web Cepi</h1>
</div>

<div class="bottom-left-text">
    <h2 class="blink-text"><strong>Welcome!</strong></h2>
    <h2 class="blink-text"><strong>To My Form!</strong></h2>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Nemo quas autem optio deserunt quisquam?</p>
</div>

<div class="social-icons">
    <a href="#"><i class="fa-brands fa-facebook"></i></a>
    <a href="#"><i class="fa-brands fa-twitter"></i></a>
    <a href="#"><i class="fa-brands fa-youtube"></i></a>
    <a href="#"><i class="fa-brands fa-instagram"></i></a>
    <a href="#"><i class="fa-brands fa-google-drive"></i></a>
</div>

</body>
</html>
