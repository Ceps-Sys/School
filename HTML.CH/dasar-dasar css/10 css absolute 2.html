<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css absolute 2</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            margin: auto;
        }
        .kotak1 {
            background-color: red;
        }
        .kotak2 {
            background-color: green;
            position: absolute;
            top: 50px;
            left: 275px;
        }
        .kotak3 {
            background-color: blue;
        }
        .container {
            background-color: rgb(77, 0, 221);
            width: 600px;
            height: 700px;
            border: 10px solid black;
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="kotak1"></div>
        <div class="kotak2"></div>
        <div class="kotak3"></div>
    </div>
</body>
</html>
