<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gambar Bootstrap 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 30px; background-color: #f4f4f4; }
        .box { background: white; padding: 20px; margin-bottom: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="mb-4">Eksperimen Gambar Bootstrap 5</h2>

        <div class="row">
            <div class="col-md-6 box">
                <h5>Responsive & Rounded</h5>
                <img src="https://picsum.photos/600/300" class="img-fluid rounded" alt="Random Image">
            </div>

            <div class="col-md-6 box">
                <h5>Circle & Thumbnail</h5>
                <div class="d-flex gap-3">
                    <img src="https://picsum.photos/150" class="rounded-circle" alt="Circle">
                    <img src="https://picsum.photos/150" class="img-thumbnail" alt="Thumbnail">
                </div>
            </div>

            <div class="col-md-12 box">
                <h5>Figure dengan Caption</h5>
                <figure class="figure">
                    <img src="https://picsum.photos/1000/400" class="figure-img img-fluid rounded" alt="...">
                    <figcaption class="figure-caption">Sumber: Unsplash - Foto Pemandangan Responsive.</figcaption>
                </figure>
            </div>
        </div>
    </div>

</body>
</html>
