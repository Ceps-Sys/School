<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacing & Sizing - Cepi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .box-container { background: #eee; border: 1px solid #ccc; margin-bottom: 20px; }
        .box-item { background: #0d6efd; color: white; display: inline-block; }
        .bg-padding { background: #198754; color: white; border: 5px solid #055160; }
    </style>
</head>
<body class="p-4">

    <div class="container">
        <h2 class="mb-4">Spacing (Margin & Padding)</h2>

        <div class="box-container p-2">
            <h5>Margin  (Jarak antar balok )</h5>
            <div class="box-item me-1 p-2">Tanpa Margin</div>
            <div class="box-item me-3 p-2">Margin End 3</div>
            <div class="box-item me-5 p-2">Margin End 5</div>
        </div>

        <div class="box-container p-2">
            <h5>Padding  (Jarak teks ke garis coklat)</h5>
            <div class="bg-padding p-0 mb-2">Padding 0 (Sesak)</div>
            <div class="bg-padding p-3 mb-2">Padding 3 (Pas)</div>
            <div class="bg-padding p-5">Padding 5 (Lega)</div>
        </div>

        <h2 class="my-4"> Sizing (Width)</h2>
        
        <div class="mb-2 bg-info w-25 p-2 text-white">Lebar 25%</div>
        <div class="mb-2 bg-info w-50 p-2 text-white">Lebar 50%</div>
        <div class="mb-2 bg-info w-75 p-2 text-white">Lebar 75%</div>
        <div class="mb-2 bg-info w-100 p-2 text-white text-center">Lebar 100%</div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
