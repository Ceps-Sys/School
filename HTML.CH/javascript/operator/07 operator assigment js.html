<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cepi Handani | Operator Assigment</title>
</head>
<body>
    <p>Operator penugasan/assigment terdiri dari:</p>
    <ul>
        <li>= (pengisian nilai)</li>
        <li>+= (pengisian dan penambahan)</li>
        <li>-= (pengisian dan pengurangan)</li>
        <li>*= (pengisian dan perkalian)</li>
        <li>/= (pengisian dan pembagian)</li>
        <li>%= (pengisian dan modulus/sisa bagi)</li>
    </ul>
    
    <script>
        //pengisian nilai
        var a=10;
        var b=5;
        var c=2;
        document.writeln("Nilai awal a=" +a+ "<br>");
        document.writeln("Nilai awal b=" +b+ "<br>");
        document.writeln("Nilai awal c=" +c+ "<br>");

        //penambahan
        a += 5; // sama dengan a = a + 5
        document.writeln("Hasil a += 5 = " +a+ "<br>");

        //pengurangan
        b -= 2; // sama dengan b = b - 2
        document.writeln("Hasil b -= 2 = " +b+ "<br>");

        //perkalian
        c *= 3; // sama dengan c = c * 3
        document.writeln("Hasil c *= 3 = " +c+ "<br>");

        //pembagian
        a /= 2; // sama dengan a = a / 2
        document.writeln("Hasil a /= 2 = " +a+ "<br>");

        //modulus
        b %= 2; // sama dengan b = b % 2
        document.writeln("Hasil b %= 2 = " +b+ "<br>");

        //pemangkatan
        c **= 2; // sama dengan c = c ** 2
        document.writeln("Hasil c **= 2 = " +c+ "<br>");
    </script>
</body>
</html>
