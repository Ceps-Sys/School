<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position relative</title>
    <style>
        div {
            width: 200px;
            height: 200px;
        }
        .kotak1 {
            background-color: red;
        }
        .kotak2 {
            background-color: green;
            position: relative;
            /*acuan posisi terhadap posisi semula*/
            top: 100px;
            left: 150px;
        }
        .kotak3 {
            background-color: blue;
        }
    </style>
</head>
<body>
    <div class="kotak1"></div>
    <div class="kotak2"></div>
    <div class="kotak3"></div>
</body>
</html>
