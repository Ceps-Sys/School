    <!-- Skrip JavaScript untuk mengontrol audio -->
    <script>
        var audio1 = document.getElementById('backgroundAudio1');
        var audio2 = document.getElementById('backgroundAudio2');
        var audioToggle = document.getElementById('audioToggle');
        var nowPlaying = document.getElementById('nowPlaying');
        var musicState = 0; // 0: tidak diputar, 1: lagu pertama, 2: lagu kedua

        // Set volume agar tidak terlalu keras
        audio1.volume = 0.7;
        audio2.volume = 0.7;

        // Fungsi untuk menghentikan semua audio
        function stopAllAudio() {
            audio1.pause();
            audio1.currentTime = 0;
            audio2.pause();
            audio2.currentTime = 0;
        }

        function toggleAudio() {
            if (musicState === 0) {
                // Putar lagu pertama dengan loop
                stopAllAudio();
                audio1.play()
                    .then(function () {
                        musicState = 1;
                        audioToggle.textContent = 'Putar Music Berikut';
                        audioToggle.style.backgroundColor = '#c0392b';
                        audioToggle.style.color = '#ecf0f1';
                        nowPlaying.textContent = 'akaza love theme';
                    })
                    .catch(function (error) {
                        console.log('Failed to play first audio: ', error);
                        nowPlaying.textContent = 'Error: Tidak dapat memutar musik';
                    });
            } else if (musicState === 1) {
                // Putar lagu kedua dengan loop
                stopAllAudio();
                audio2.play()
                    .then(function () {
                        musicState = 2;
                        audioToggle.textContent = 'Stop Music';
                        nowPlaying.textContent = 'ncs';
                    })
                    .catch(function (error) {
                        console.log('Failed to play second audio: ', error);
                        nowPlaying.textContent = 'Error: Tidak dapat memutar musik';
                    });
            } else {
                // Stop semua musik
                stopAllAudio();
                musicState = 0;
                audioToggle.textContent = 'Putar Music';
                audioToggle.style.backgroundColor = '#e67e22';
                audioToggle.style.color = '#2c3e50';
                nowPlaying.textContent = '-';
            }
        }
    </script>
