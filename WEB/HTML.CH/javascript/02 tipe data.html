<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02 Tipe Data</title>
</head>
<body>
    
    <script>
                      document.writeln("<h1>Contoh Penulisan data number</h1>");
        document.writeln(100); //data number
        document.writeln("<br>");
        document.writeln(200.5); //data number dengan desimal
        document.writeln("<br>");

                       document.writeln("<h1>Contoh Penulisan Hexa</h1>");
        document.writeln("<br>");
        document.writeln(0xff);
        document.writeln("<br>");

                       document.writeln("<h1>Contoh Penulisan Binner</h1>");
        document.writeln("<br>");
        document.writeln(0b101110);
        document.writeln("<br>");

                       document.writeln("<h1>Contoh Penulisan Octal</h1>");
        document.writeln("<br>");
        document.writeln(0o12);
        document.writeln("<br>");

                       document.writeln("<h1>Contoh Penulisan Boolean</h1>");
        document.writeln("<br>");
        document.writeln(true);
        document.writeln("<br>");
        document.writeln(false);
        document.writeln("<br>");

                        document.writeln("<h1>Contoh Penulisan String</h1>");
        document.writeln("<br>");
        document.writeln("Hello, World!");
        document.writeln("<br>");
        document.writeln('Selamat Belajar JavaScript');
        document.writeln("<br>");
        document.writeln(`halo`+'Selamat Belajar JavaScript');
        document.writeln("<br>");




        document.writeln("<h1>Contoh Penulisan Escape Character dalam string</h1>");
        document.writeln("<br>");
        document.writeln("<textarea rows='10' cols='100'>");

        document.writeln("1. tanda enter dalam string");
        document.writeln("anjai\nmabar");
        document.writeln("<\n>");


        document.writeln("2. tanda petik dua dalam string");
        document.writeln("Dia berkata: \"Halo, apa kabar?\"");
        document.writeln("\n");

        document.writeln("3. tanda back slash dalam string");
        document.writeln("Ini adalah tanda backslash:cepi \\ x-rpl");
        document.writeln("\n");

        document.writeln("4. tanda petik satu dalam string");
        document.writeln("It\'s a beautiful day!");
        document.writeln("\n")

        document.writeln("</textarea>");



        
        

    </script>
</body>
</html>
