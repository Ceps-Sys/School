<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Border & Shadow - Cepi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .box-demo {
            width: 150px;
            height: 150px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 20px auto;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-light p-5">

    <div class="container">
        <h2 class="text-center mb-5"> Border & Shadow Bootstrap 5</h2>

        <div class="row mb-5">
            <h4 class="border-bottom pb-2">1. Border & Rounded</h4>
            <div class="col-md-3">
                <div class="box-demo border border-primary border-3">Border Primary 3</div>
            </div>
            <div class="col-md-3">
                <div class="box-demo border rounded-3 border-success">Rounded 3</div>
            </div>
            <div class="col-md-3">
                <div class="box-demo border rounded-circle border-danger">Rounded Circle</div>
            </div>
            <div class="col-md-3">
                <div class="box-demo border rounded-pill bg-warning" style="height: 80px; width: 180px;">Pill Shape</div>
            </div>
        </div>

        <div class="row">
            <h4 class="border-bottom pb-2">2. Shadow (Bayangan)</h4>
            <div class="col-md-4">
                <div class="box-demo shadow-sm">Shadow Small</div>
            </div>
            <div class="col-md-4">
                <div class="box-demo shadow">Shadow Regular</div>
            </div>
            <div class="col-md-4">
                <div class="box-demo shadow-lg">Shadow Large</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
